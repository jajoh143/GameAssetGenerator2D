<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameAssetGenerator2D — Character Builder</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f0f1a;
      --panel:    #16213e;
      --surface:  #1a2744;
      --border:   #2a3a5e;
      --accent:   #4a90d9;
      --accent2:  #7ecfff;
      --text:     #dce8ff;
      --muted:    #7a8faa;
      --success:  #4caf50;
      --error:    #ef5350;
      --radius:   6px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    header h1 { font-size: 1rem; color: var(--accent2); letter-spacing: 1px; }
    header span { color: var(--muted); font-size: 0.8rem; }

    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 280px;
      flex-shrink: 0;
      background: var(--panel);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .section-label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .btn-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .toggle-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 5px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 0.8rem;
      transition: background 0.15s, border-color 0.15s;
    }
    .toggle-btn:hover  { border-color: var(--accent); }
    .toggle-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .swatches { display: flex; gap: 6px; flex-wrap: wrap; }
    .swatch {
      width: 26px; height: 26px;
      border-radius: 4px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.15s, transform 0.1s;
      position: relative;
    }
    .swatch:hover   { transform: scale(1.15); }
    .swatch.active  { border-color: #fff; }
    .swatch .tip {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #000;
      color: #fff;
      font-size: 0.65rem;
      padding: 2px 6px;
      border-radius: 3px;
      white-space: nowrap;
      z-index: 10;
    }
    .swatch:hover .tip { display: block; }

    select {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 8px;
      border-radius: var(--radius);
      font-size: 0.82rem;
      cursor: pointer;
    }
    select:focus { outline: none; border-color: var(--accent); }

    input[type=text] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 8px;
      border-radius: var(--radius);
      font-size: 0.82rem;
    }
    input[type=text]:focus { outline: none; border-color: var(--accent); }

    #demon-section { display: none; }

    .generate-btn {
      width: 100%;
      padding: 10px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: background 0.15s;
      margin-top: 4px;
    }
    .generate-btn:hover    { background: #5aa0e9; }
    .generate-btn:disabled { background: var(--muted); cursor: not-allowed; }

    #gen-status {
      font-size: 0.75rem;
      text-align: center;
      min-height: 18px;
      color: var(--muted);
    }
    #gen-status.ok  { color: var(--success); }
    #gen-status.err { color: var(--error); }

    /* ── Main ── */
    .main {
      flex: 1;
      overflow-y: scroll;
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(540px, 1fr));
      gap: 16px;
      align-content: start;
      min-height: 0;
    }
    /* Expanded card takes full row so nothing is cut off */
    .char-card:not(.collapsed) {
      grid-column: 1 / -1;
    }

    .empty-state {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 300px;
      color: var(--muted);
      gap: 10px;
    }
    .empty-state svg { opacity: 0.2; }
    .empty-state p   { font-size: 0.85rem; }

    /* ── Cards ── */
    .char-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      gap: 10px;
      cursor: pointer;
      user-select: none;
    }
    .card-header:hover { background: #1e2f52; }
    .card-chevron {
      font-size: 0.7rem;
      color: var(--muted);
      transition: transform 0.18s ease;
      flex-shrink: 0;
      margin-right: 4px;
    }
    .char-card.collapsed .card-chevron { transform: rotate(-90deg); }
    .char-card.collapsed .card-header { border-bottom: none; }
    .char-card.collapsed .card-body   { display: none; }
    .card-name { color: var(--accent2); font-weight: 600; font-size: 0.85rem; }
    .card-meta { color: var(--muted); font-size: 0.75rem; }
    .card-actions { display: flex; gap: 8px; margin-left: auto; }
    .card-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 0.75rem;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
    }
    .card-btn:hover { border-color: var(--accent); color: var(--accent2); }

    .card-body { padding: 14px; display: flex; flex-direction: column; gap: 14px; }

    .live-row { display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-start; }
    .live-box { text-align: center; }
    .live-box span {
      display: block;
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    canvas.live {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 1px solid var(--border);
      border-radius: 3px;
    }

    .card-controls {
      display: flex;
      gap: 14px;
      align-items: center;
      flex-wrap: wrap;
    }
    .card-controls label {
      font-size: 0.75rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .card-controls input[type=range] { width: 80px; cursor: pointer; }
    .card-controls select { width: auto; padding: 3px 6px; font-size: 0.75rem; }

    details { border-top: 1px solid var(--border); padding-top: 10px; }
    summary { cursor: pointer; color: var(--muted); font-size: 0.72rem; letter-spacing: 1.5px; user-select: none; text-transform: uppercase; }
    summary:hover { color: var(--text); }
    .strip-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    .strip-table td { padding: 2px 4px; vertical-align: middle; white-space: nowrap; }
    .strip-label { color: var(--muted); font-size: 0.68rem; width: 90px; }
    .strip-frames { display: flex; gap: 2px; }
    .strip-frame canvas {
      display: block;
      image-rendering: pixelated;
      border: 1px solid var(--border);
      border-radius: 2px;
    }
  </style>
</head>
<body>

<header>
  <h1>GameAssetGenerator2D</h1>
  <span>Character Builder</span>
  <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
    <button id="expand-all-btn" class="card-btn" style="display:none">Expand All</button>
    <button id="collapse-all-btn" class="card-btn" style="display:none">Collapse All</button>
    <button id="clear-btn" class="card-btn" style="display:none">Clear All</button>
  </div>
</header>

<div class="layout">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">

    <div>
      <div class="section-label">Character Type</div>
      <div class="btn-row" id="type-row">
        <button class="toggle-btn active" data-val="human">Human</button>
        <button class="toggle-btn"        data-val="demon">Demon</button>
      </div>
    </div>

    <div id="human-skin-section">
      <div class="section-label">Skin Tone</div>
      <div class="swatches" id="skin-swatches"></div>
    </div>

    <div>
      <div class="section-label">Hair Color</div>
      <div class="swatches" id="hair-color-swatches"></div>
    </div>

    <div>
      <div class="section-label">Hair Style</div>
      <div class="btn-row" id="hair-style-row">
        <button class="toggle-btn active" data-val="short">Short</button>
        <button class="toggle-btn"        data-val="medium">Medium</button>
        <button class="toggle-btn"        data-val="long">Long</button>
      </div>
    </div>

    <div>
      <div class="section-label">Clothing</div>
      <select id="clothing-select"></select>
    </div>

    <div>
      <div class="section-label">Pants</div>
      <select id="pants-select"></select>
    </div>

    <div>
      <div class="section-label">Shoes</div>
      <select id="shoes-select"></select>
    </div>

    <div id="demon-section">
      <div class="section-label">Demon Skin</div>
      <div class="swatches" id="demon-skin-swatches"></div>

      <div class="section-label" style="margin-top:14px">Horn Style</div>
      <div class="btn-row" id="horn-row">
        <button class="toggle-btn active" data-val="curved">Curved</button>
        <button class="toggle-btn"        data-val="straight">Straight</button>
        <button class="toggle-btn"        data-val="ram">Ram</button>
      </div>

      <div class="section-label" style="margin-top:14px">Tail Style</div>
      <div class="btn-row" id="tail-row">
        <button class="toggle-btn active" data-val="long">Long</button>
        <button class="toggle-btn"        data-val="medium">Medium</button>
        <button class="toggle-btn"        data-val="short">Short</button>
      </div>
    </div>

    <div>
      <div class="section-label">Sprite Size</div>
      <div class="btn-row" id="size-row">
        <button class="toggle-btn active" data-val="64">64 px</button>
        <button class="toggle-btn"        data-val="96">96 px</button>
        <button class="toggle-btn"        data-val="128">128 px</button>
      </div>
    </div>

    <div>
      <div class="section-label">Character Name</div>
      <input type="text" id="char-name" placeholder="my_character" maxlength="64">
    </div>

    <div>
      <div class="section-label">Load Preset</div>
      <select id="preset-select"><option value="">— choose preset —</option></select>
    </div>

    <button class="generate-btn" id="gen-btn" disabled>Generate Character</button>
    <div id="gen-status">Connecting to server…</div>

  </aside>

  <!-- ── Main ── -->
  <main class="main" id="main">
    <div class="empty-state" id="empty-state">
      <svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <path d="M3 9h18M9 21V9"/>
      </svg>
      <p>Configure a character on the left and click <strong>Generate</strong>.</p>
    </div>
  </main>

</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const state = {
  type: 'human', skin: null, hair: null, hairStyle: 'short',
  clothing: null, pants: null, shoes: null,
  demonSkin: null, hornStyle: 'curved', tailStyle: 'long',
  frameSize: 64, name: '',
};

let options = null;
const liveAnimations = {};
const cardsByName = {};   // name → cardId, for replace-on-regenerate
let cardCounter = 0;

const ANIM_ROWS = [
  { name: 'idle',         frameCount: 4 },
  { name: 'walk south',   frameCount: 8 },
  { name: 'walk west',    frameCount: 8 },
  { name: 'walk north',   frameCount: 8 },
  { name: 'walk east',    frameCount: 8 },
  { name: 'attack south', frameCount: 6 },
  { name: 'attack west',  frameCount: 6 },
  { name: 'attack north', frameCount: 6 },
  { name: 'attack east',  frameCount: 6 },
];

// ── Boot ───────────────────────────────────────────────────────────────────
async function boot() {
  try {
    const r = await fetch('/api/options');
    if (!r.ok) throw new Error('Server returned ' + r.status);
    options = await r.json();
    populateSidebar();
    document.getElementById('gen-btn').disabled = false;
    setStatus('Ready.', '');
    loadManifest();
  } catch (e) {
    setStatus('Server error: ' + e.message, 'err');
  }
}

// ── Load batch-generated characters from manifest ─────────────────────────
async function loadManifest() {
  try {
    const r = await fetch('/manifest.json?t=' + Date.now());
    if (!r.ok) return;
    const manifest = await r.json();
    if (!manifest.characters || !manifest.characters.length) return;
    document.getElementById('empty-state').style.display = 'none';
    for (const char of manifest.characters) {
      const filePath = char.file.replace(/^\.\.\/output\//, '/output/');
      loadAndShowCard(char.name, filePath, manifest.frameWidth || 64);
    }
  } catch (_) { /* manifest may not exist yet, ignore */ }
}

// ── Populate sidebar ───────────────────────────────────────────────────────
function populateSidebar() {
  buildSwatches('skin-swatches',       options.skinTones,  'skin');
  buildSwatches('hair-color-swatches', options.hairColors, 'hair');
  buildSwatches('demon-skin-swatches', options.demonSkins, 'demonSkin');
  buildSelect('clothing-select', options.clothing, 'clothing');
  buildSelect('pants-select',    options.pants,    'pants');
  buildSelect('shoes-select',    options.shoes,    'shoes');
  buildPresets();

  const d = options.defaults;
  activateSwatch('skin-swatches',       d.skin,      'skin');
  activateSwatch('hair-color-swatches', d.hair,      'hair');
  activateSwatch('demon-skin-swatches', d.demonSkin, 'demonSkin');
  setSelectVal('clothing-select', d.clothing); state.clothing = d.clothing;
  setSelectVal('pants-select',    d.pants);    state.pants    = d.pants;
  setSelectVal('shoes-select',    d.shoes);    state.shoes    = d.shoes;
}

function buildSwatches(containerId, palette, stateKey) {
  const el = document.getElementById(containerId);
  el.innerHTML = '';
  Object.entries(palette).forEach(([key, color]) => {
    const sw = document.createElement('div');
    sw.className = 'swatch';
    sw.style.background = color;
    sw.dataset.key = key;
    sw.innerHTML = `<span class="tip">${key.replace(/_/g,' ')}</span>`;
    sw.addEventListener('click', () => activateSwatch(containerId, key, stateKey));
    el.appendChild(sw);
  });
}

function activateSwatch(containerId, val, stateKey) {
  state[stateKey] = val;
  document.getElementById(containerId)
    .querySelectorAll('.swatch')
    .forEach(s => s.classList.toggle('active', s.dataset.key === val));
}

function buildSelect(id, keys, stateKey) {
  const el = document.getElementById(id);
  el.innerHTML = '';
  keys.forEach(k => {
    const opt = document.createElement('option');
    opt.value = k;
    opt.textContent = k.replace(/_/g, ' ');
    el.appendChild(opt);
  });
  el.addEventListener('change', () => { state[stateKey] = el.value; });
}

function setSelectVal(id, val) {
  const el = document.getElementById(id);
  if (el) el.value = val;
}

function buildPresets() {
  const sel = document.getElementById('preset-select');
  Object.keys(options.presets).forEach(k => {
    const opt = document.createElement('option');
    opt.value = k;
    opt.textContent = k.replace(/_/g, ' ');
    sel.appendChild(opt);
  });
  sel.addEventListener('change', () => {
    const p = options.presets[sel.value];
    if (p) { applyConfig(p); sel.value = ''; }
  });
}

function applyConfig(cfg) {
  if (cfg.type)      setType(cfg.type);
  if (cfg.skin)      activateSwatch('skin-swatches',       cfg.skin,      'skin');
  if (cfg.hair)      activateSwatch('hair-color-swatches', cfg.hair,      'hair');
  if (cfg.hairStyle) activateToggle('hair-style-row', cfg.hairStyle, 'hairStyle');
  if (cfg.clothing)  { state.clothing = cfg.clothing; setSelectVal('clothing-select', cfg.clothing); }
  if (cfg.pants)     { state.pants    = cfg.pants;    setSelectVal('pants-select',    cfg.pants); }
  if (cfg.shoes)     { state.shoes    = cfg.shoes;    setSelectVal('shoes-select',    cfg.shoes); }
  if (cfg.demonSkin) activateSwatch('demon-skin-swatches', cfg.demonSkin, 'demonSkin');
  if (cfg.hornStyle) activateToggle('horn-row',  cfg.hornStyle, 'hornStyle');
  if (cfg.tailStyle) activateToggle('tail-row',  cfg.tailStyle, 'tailStyle');
}

// ── Toggle rows ────────────────────────────────────────────────────────────
function wireToggleRow(rowId, stateKey, onChange) {
  document.getElementById(rowId).querySelectorAll('.toggle-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activateToggle(rowId, btn.dataset.val, stateKey);
      if (onChange) onChange(btn.dataset.val);
    });
  });
}

function activateToggle(rowId, val, stateKey) {
  if (stateKey) state[stateKey] = val;
  document.getElementById(rowId)
    .querySelectorAll('.toggle-btn')
    .forEach(b => b.classList.toggle('active', b.dataset.val === val));
}

function setType(val) {
  activateToggle('type-row', val, 'type');
  document.getElementById('demon-section').style.display      = val === 'demon' ? '' : 'none';
  document.getElementById('human-skin-section').style.display = val === 'human' ? '' : 'none';
}

wireToggleRow('type-row',       'type',      setType);
wireToggleRow('hair-style-row', 'hairStyle', null);
wireToggleRow('horn-row',       'hornStyle', null);
wireToggleRow('tail-row',       'tailStyle', null);
wireToggleRow('size-row',       'frameSize', null);

document.getElementById('char-name').addEventListener('input', e => { state.name = e.target.value.trim(); });
document.getElementById('gen-btn').addEventListener('click', generate);
document.getElementById('expand-all-btn').addEventListener('click', () => {
  document.querySelectorAll('.char-card').forEach(c => c.classList.remove('collapsed'));
});
document.getElementById('collapse-all-btn').addEventListener('click', () => {
  document.querySelectorAll('.char-card').forEach(c => c.classList.add('collapsed'));
});
document.getElementById('clear-btn').addEventListener('click', () => {
  Object.keys(liveAnimations).forEach(id => {
    liveAnimations[id].timers.forEach(clearInterval);
    delete liveAnimations[id];
  });
  Object.keys(cardsByName).forEach(n => delete cardsByName[n]);
  document.querySelectorAll('.char-card').forEach(c => c.remove());
  document.getElementById('empty-state').style.display = '';
  updateClearBtn();
});

// ── Generate ───────────────────────────────────────────────────────────────
async function generate() {
  const btn = document.getElementById('gen-btn');
  btn.disabled = true;
  setStatus('Generating…', '');

  const name     = state.name || ('character_' + Date.now());
  const frameSize = Number(state.frameSize) || 64;
  const config   = buildConfig();

  try {
    const r = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ config, name, frameSize }),
    });
    const data = await r.json();
    if (!r.ok || !data.success) throw new Error(data.error || 'Unknown error');

    setStatus('Done!', 'ok');
    loadAndShowCard(data.name, data.file, frameSize);
  } catch (e) {
    setStatus('Error: ' + e.message, 'err');
  } finally {
    btn.disabled = false;
  }
}

function buildConfig() {
  const cfg = {
    type: state.type,
    hair: state.hair, hairStyle: state.hairStyle,
    clothing: state.clothing, pants: state.pants, shoes: state.shoes,
  };
  if (state.type === 'human') {
    cfg.skin = state.skin;
  } else {
    cfg.demonSkin = state.demonSkin;
    cfg.hornStyle = state.hornStyle;
    cfg.tailStyle = state.tailStyle;
  }
  return cfg;
}

// ── Card ───────────────────────────────────────────────────────────────────
function loadAndShowCard(name, filePath, frameSize) {
  const img = new Image();
  img.onload = () => {
    // Replace existing card for same name (e.g. re-generating)
    if (cardsByName[name]) removeCard(cardsByName[name]);

    const card = buildCard(name, filePath, frameSize, img);
    const main = document.getElementById('main');
    main.insertBefore(card, document.getElementById('empty-state').nextSibling);
    cardsByName[name] = card.dataset.cardId;
    updateClearBtn();
    startCardAnims(card.dataset.cardId, img, frameSize);
  };
  img.onerror = () => setStatus('Failed to load spritesheet image.', 'err');
  img.src = filePath + '?t=' + Date.now();
}

function removeCard(id) {
  const st = liveAnimations[id];
  if (st) { st.timers.forEach(clearInterval); delete liveAnimations[id]; }
  for (const [n, cid] of Object.entries(cardsByName)) {
    if (cid === id) delete cardsByName[n];
  }
  const card = document.querySelector(`[data-card-id="${id}"]`);
  if (card) card.remove();
  if (!document.querySelector('.char-card')) {
    document.getElementById('empty-state').style.display = '';
  }
  updateClearBtn();
}

function updateClearBtn() {
  const hasCards = !!document.querySelector('.char-card');
  document.getElementById('clear-btn').style.display         = hasCards ? '' : 'none';
  document.getElementById('expand-all-btn').style.display    = hasCards ? '' : 'none';
  document.getElementById('collapse-all-btn').style.display  = hasCards ? '' : 'none';
}

function buildCard(name, filePath, frameSize, img) {
  const id = String(++cardCounter);
  const card = document.createElement('div');
  card.className = 'char-card';
  card.dataset.cardId = id;

  // Header
  const header = document.createElement('div');
  header.className = 'card-header';
  header.title = 'Click to expand / collapse';

  const chevron = document.createElement('span');
  chevron.className = 'card-chevron';
  chevron.textContent = '▼';

  const nameEl = document.createElement('div');
  nameEl.className = 'card-name';
  nameEl.textContent = name.replace(/_/g, ' ');

  const metaEl = document.createElement('div');
  metaEl.className = 'card-meta';
  metaEl.textContent = frameSize + '×' + frameSize + ' px/frame';

  const dlBtn = document.createElement('a');
  dlBtn.className = 'card-btn';
  dlBtn.href = filePath;
  dlBtn.download = name + '_spritesheet.png';
  dlBtn.textContent = 'Download PNG';

  const rmBtn = document.createElement('button');
  rmBtn.className = 'card-btn';
  rmBtn.textContent = '✕ Remove';
  rmBtn.addEventListener('click', () => removeCard(id));

  const actions = document.createElement('div');
  actions.className = 'card-actions';
  actions.appendChild(dlBtn);
  actions.appendChild(rmBtn);

  header.appendChild(chevron);
  header.appendChild(nameEl);
  header.appendChild(metaEl);
  header.appendChild(actions);
  card.appendChild(header);

  // Collapse/expand on header click (but not on action buttons)
  header.addEventListener('click', e => {
    if (e.target.closest('.card-actions')) return;
    card.classList.toggle('collapsed');
  });
  // Start collapsed so all cards are visible in the list
  card.classList.add('collapsed');

  // Body
  const body = document.createElement('div');
  body.className = 'card-body';

  // Controls
  const controls = document.createElement('div');
  controls.className = 'card-controls';
  controls.innerHTML = `
    <label>Bg:
      <select class="bg-sel">
        <option value="transparent">Transparent</option>
        <option value="#1a1a2e">Dark</option>
        <option value="#ffffff">White</option>
        <option value="#3a7d44">Green</option>
      </select>
    </label>
    <label>FPS:
      <input type="range" class="fps-sl" min="2" max="24" value="8" step="1">
      <span class="fps-val">8</span>
    </label>
    <label>Scale:
      <input type="range" class="scale-sl" min="1" max="5" value="2" step="1">
      <span class="scale-val">2×</span>
    </label>`;
  body.appendChild(controls);

  // Live previews for key animations
  const liveRow = document.createElement('div');
  liveRow.className = 'live-row';

  const animState = { fps: 8, scale: 2, bg: 'transparent', frameSize, img, timers: [], canvases: [] };
  liveAnimations[id] = animState;

  [0, 1, 2, 5].forEach(rowIdx => { // idle, walk_south, walk_west, attack_south
    const anim = ANIM_ROWS[rowIdx];
    const box  = document.createElement('div');
    box.className = 'live-box';
    const cvs = document.createElement('canvas');
    cvs.className = 'live';
    cvs.dataset.rowIdx     = rowIdx;
    cvs.dataset.frameCount = anim.frameCount;
    cvs.dataset.curFrame   = 0;
    const lbl = document.createElement('span');
    lbl.textContent = anim.name;
    box.appendChild(cvs);
    box.appendChild(lbl);
    liveRow.appendChild(box);
    animState.canvases.push(cvs);
  });
  body.appendChild(liveRow);

  // Wire card controls
  controls.querySelector('.fps-sl').addEventListener('input', e => {
    animState.fps = +e.target.value;
    controls.querySelector('.fps-val').textContent = e.target.value;
    restartCardTimer(id);
  });
  controls.querySelector('.scale-sl').addEventListener('input', e => {
    animState.scale = +e.target.value;
    controls.querySelector('.scale-val').textContent = e.target.value + '×';
    resizeCardCanvases(id);
  });
  controls.querySelector('.bg-sel').addEventListener('change', e => {
    animState.bg = e.target.value;
  });

  // All-frames strip
  const det = document.createElement('details');
  const sum = document.createElement('summary');
  sum.textContent = 'All Frames';
  det.appendChild(sum);

  const table = document.createElement('table');
  table.className = 'strip-table';
  ANIM_ROWS.forEach((anim, rowIdx) => {
    const tr   = document.createElement('tr');
    const tdL  = document.createElement('td');
    tdL.className = 'strip-label';
    tdL.textContent = anim.name;
    const tdF  = document.createElement('td');
    const strip = document.createElement('div');
    strip.className = 'strip-frames';
    for (let f = 0; f < anim.frameCount; f++) {
      const fw  = document.createElement('div');
      fw.className = 'strip-frame';
      const c = document.createElement('canvas');
      c.width = c.height = 32;
      drawFrame(c, img, rowIdx, f, frameSize, 'transparent');
      fw.appendChild(c);
      strip.appendChild(fw);
    }
    tdF.appendChild(strip);
    tr.appendChild(tdL);
    tr.appendChild(tdF);
    table.appendChild(tr);
  });
  det.appendChild(table);
  body.appendChild(det);

  card.appendChild(body);
  return card;
}

// ── Animation ──────────────────────────────────────────────────────────────
function startCardAnims(id, img, frameSize) {
  resizeCardCanvases(id);
  restartCardTimer(id);
}

function resizeCardCanvases(id) {
  const st = liveAnimations[id];
  if (!st) return;
  const sz = st.frameSize * st.scale;
  st.canvases.forEach(cvs => {
    cvs.width  = sz;
    cvs.height = sz;
  });
}

function restartCardTimer(id) {
  const st = liveAnimations[id];
  if (!st) return;
  st.timers.forEach(clearInterval);
  st.timers.length = 0;

  // Each canvas animates independently
  const groups = {};
  st.canvases.forEach(cvs => {
    const ri = +cvs.dataset.rowIdx;
    if (!groups[ri]) groups[ri] = { canvases: [], frame: 0, frameCount: +cvs.dataset.frameCount };
    groups[ri].canvases.push(cvs);
  });

  const tid = setInterval(() => {
    Object.values(groups).forEach(g => {
      g.canvases.forEach(cvs => drawFrame(cvs, st.img, +cvs.dataset.rowIdx, g.frame, st.frameSize, st.bg));
      g.frame = (g.frame + 1) % g.frameCount;
    });
  }, 1000 / st.fps);
  st.timers.push(tid);
}

function drawFrame(canvas, img, row, col, frameSize, bg) {
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (bg && bg !== 'transparent') {
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(img, col * frameSize, row * frameSize, frameSize, frameSize, 0, 0, canvas.width, canvas.height);
}

// ── Helpers ────────────────────────────────────────────────────────────────
function setStatus(msg, cls) {
  const el = document.getElementById('gen-status');
  el.textContent = msg;
  el.className   = cls || '';
}

boot();
</script>
